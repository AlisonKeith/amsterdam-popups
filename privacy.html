*{box-sizing:border-box}
body{margin:0;background:var(--page);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6}

header{padding:18px 0 0}
.head-row{display:flex;align-items:center;justify-content:space-between;gap:14px}
.brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit}
.mark{width:36px;height:36px;border-radius:9px;overflow:hidden;flex:none}
.wordmark{font-family:"Archivo Expanded",sans-serif;font-weight:700;font-size:17px;letter-spacing:-0.2px;color:var(--ink)}
.lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-size:11px}
.lang button{appearance:none;border:0;background:transparent;padding:5px 11px;cursor:pointer;color:var(--muted);font-family:inherit;font-size:11px}
.lang button.on{background:var(--red);color:#fff;font-weight:500}

.flagstrip i{display:block}.flagstrip .r{flex:1;background:var(--red)}.flagstrip .b{width:60px;background:#141414}
.back{display:inline-flex;align-items:center;gap:5px;margin:18px 0 4px;font-size:13px;color:var(--red);text-decoration:none;font-weight:500}
main{padding:6px 0 50px}
h1{font-family:"Archivo Expanded",sans-serif;font-weight:600;font-size:23px;margin:10px 0 4px}
.updated{font-size:12.5px;color:var(--faint);margin:0 0 18px}
h2{font-size:15.5px;font-weight:600;margin:24px 0 6px}
p{font-size:14.5px;color:#3c3933;margin:0 0 12px}
a{color:var(--red)}
footer{border-top:1px solid var(--line);margin-top:24px}
footer .wrap{padding:16px 18px;font-size:12px;color:var(--faint)}
:focus-visible{outline:2px solid var(--red);outline-offset:2px}

<p class="updated">Last updated: 27 June 2026</p>

<h2>1. Who we are</h2>
<p>This Privacy Policy governs the privacy practices of Amsterdam Pop-ups (accessible via amsterdampopups.com). Amsterdam Pop-ups is an independent, non-commercial guide run by private individuals based in Amsterdam, the Netherlands. For any privacy-related inquiries, please contact us at hello@amsterdampopups.com.</p>

<p><strong>Log data.</strong> Like most website operators, we and our hosting and infrastructure partners (GitHub Pages and Cloudflare) automatically collect non-personally-identifying information of the sort that web browsers and servers typically make available. This includes browser type, language preference, referring site, and the date and time of each visitor request. We use this only to operate and secure the site.</p>
<p><strong>Tips you send.</strong> If you submit a tip through our form, we receive the information you enter, and your email address only if you choose to provide it. We use this solely to follow up on your tip, and we never sell your data.</p>

<p>By default this site sets no advertising or analytics cookies. Advertising is only enabled if you accept it in our cookie banner.</p>

<h2>3. Cookies en Google AdSense</h2>
<p>Standaard plaatst deze site geen advertentie- of analysecookies. Advertenties worden alleen ingeschakeld als je ze accepteert in onze cookiebanner.</p>
<p><strong>Externe adverteerders en cookies.</strong> We gebruiken Google AdSense om advertenties te tonen wanneer je onze website bezoekt. Google gebruikt als externe leverancier cookies om advertenties op deze site te tonen. Met deze advertentiecookies kunnen Google en zijn partners advertenties tonen aan onze bezoekers op basis van hun bezoek aan deze site en/of andere sites op het internet.</p>
<p>Bezoekers kunnen zich afmelden voor gepersonaliseerde advertenties via <a href="https://adssettings.google.com" target="_blank" rel="noopener">Google Advertentie-instellingen</a> of via <a href="https://www.aboutads.info/choices" target="_blank" rel="noopener">About Ads</a>.</p>

<p>Ben je in Californië of een andere Amerikaanse staat met vergelijkbare wetten, dan kun je je afmelden voor de "verkoop" of het "delen" van persoonsgegevens voor gerichte advertenties; cookies weigeren in onze banner doet dit, en we respecteren het Global Privacy Control-signaal.</p>
